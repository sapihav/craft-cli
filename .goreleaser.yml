version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: craft-cli
    main: ./main.go
    binary: craft
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/ashrafali/craft-cli/cmd.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sapihav
    name: craft-cli
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: sapihav
      name: homebrew-tap
      # Cross-repo PAT, same secret that exa/perplexity/tavily/clef use to
      # push casks to sapihav/homebrew-tap. Without this, goreleaser falls
      # back to GITHUB_TOKEN which is scoped to this repo only and can't
      # write to the tap.
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/sapihav/craft-cli
    description: CLI for interacting with Craft.do documents
    license: MIT
    install: |
      bin.install "craft"
